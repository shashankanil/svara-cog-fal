build:
  gpu: true
  cuda: "12.6"
  python_version: "3.11"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
  python_requirements: requirements.txt
  run:
    - curl -o /usr/local/bin/pget -L "https://github.com/replicate/pget/releases/latest/download/pget_linux_x86_64" && chmod +x /usr/local/bin/pget
predict: "predict.py:Predictor"
